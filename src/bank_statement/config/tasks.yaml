research_task:
  description: >
    Extract and structure all key information from the following bank statement {document}
    Extract exactly:
    - Account holder name
    - RFC/CURP
    - Cust id
    - Dirección
    - Periodo cubierto
    - Saldo Inicial
    - Entradas
    - Salidas
    - Saldo final
    - Complete list of transactions with date, description, amount and type (income, expense, earnings)
    - Top 3 largest income transactions
    - Top 3 largest expense transactions
  expected_output: >
      Structured plain text in Spanish with clearly labeled sections.
      Include a JSON block at the end with key financial figures:
      
      Example format:
      TITULAR: Juan Perez
      RFC: XXXX123456
      MOVIMIENTOS:
      - 01-04-2025 | Transferencia recibida | $1,000.00 | Ingreso
  agent: extractor
  output_file: extraccion.txt

reporting_task:
  description: >
    Based on the extracted bank statement data, generate a complete executive report in Spanish that includes:
    - Brief profile of the account holder
    - Financial summary of the period
    - Analysis of income sources and their origin
    - Analysis of expenses and spending patterns
    - Notable observations or anomalies
    - General conclusion about financial health of the period
  expected_output: >
      A well structured report in Spanish using markdown format.
      Do NOT use markdown tables. Use bullet points and labeled
      sections instead. Use # for headers, ## for sections, and - for lists.
  agent: analista
  output_file: reporte.txt